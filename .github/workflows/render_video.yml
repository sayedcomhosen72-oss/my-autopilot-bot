name: Unstoppable Desi Video Renderer

on:
  repository_dispatch:
    types: [trigger_video_render]

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install gTTS numpy requests imageio-ffmpeg
          pip install "Pillow<10.0.0"
          pip install moviepy==1.0.3

      - name: Run Dynamic Video Script
        env:
          TITLE: ${{ github.event.client_payload.title }}
          INTRO: ${{ github.event.client_payload.intro_script }}
          BODY: ${{ github.event.client_payload.body_script }}
        run: python make_video.py

      - name: Push Video to Separate Branch (Direct MP4 URL)
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Nayi branch create ya switch karega jiska naam video-assets hai
          git checkout -b video-assets || git checkout video-assets
          
          # Video file ko rename/copy karega safe side ke liye
          cp output.mp4 video.mp4
          
          # GitHub branch par commit karke force push karega
          git add video.mp4
          git commit -m "Update rendered video: ${{ github.event.client_payload.title }}"
          git push origin video-assets --force
