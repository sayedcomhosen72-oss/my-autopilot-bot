name: Unstoppable Desi Video Renderer

on:
  repository_dispatch:
    types: [trigger_video_render]

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install gTTS numpy requests imageio-ffmpeg
          pip install "Pillow<10.0.0"
          pip install moviepy==1.0.3

      - name: Run Dynamic Video Script
        env:
          TITLE: ${{ github.event.client_payload.title }}
          INTRO: ${{ github.event.client_payload.intro_script }}
          BODY: ${{ github.event.client_payload.body_script }}
        run: python make_video.py

      - name: Upload Video and Print Raw Link
        run: |
          if [ -f "output.mp4" ]; then
            # Video ko upload karke direct download link nikal rahe hain
            LINK=$(curl -F "file=@output.mp4" https://file.io | grep -o '"link":"[^"]*"' | cut -d'"' -f4)
            
            # Is pure code ka sabse zaroori hissa: Link ko ekdam saaf tareeqe se print karna
            echo "========================================="
            echo "MY_FINAL_VIDEO_URL: $LINK"
            echo "========================================="
          else
            echo "Error: output.mp4 nahi mili!"
            exit 1
          fi
