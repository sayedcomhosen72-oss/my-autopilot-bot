name: Unstoppable Desi Video Renderer

on:
  repository_dispatch:
    types: [trigger_video_render]

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Correct Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install gTTS numpy requests moviepy

    - name: Run Dynamic Video Script
      env:
        TITLE: ${{ github.event.client_payload.title }}
        INTRO: ${{ github.event.client_payload.intro_script }}
        BODY: ${{ github.event.client_payload.body_script }}
      run: |
        python make_video.py
