name: Unstoppable Desi Video Renderer

on:
  repository_dispatch:
    types: [trigger_video_render]

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    # Yeh niche wali do lines GitHub ko push aur release karne ki permission dengi
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install gTTS numpy requests imageio-ffmpeg
          pip install "Pillow<10.0.0"
          pip install moviepy==1.0.3

      - name: Run Dynamic Video Script
        env:
          TITLE: ${{ github.event.client_payload.title }}
          INTRO: ${{ github.event.client_payload.intro_script }}
          BODY: ${{ github.event.client_payload.body_script }}
        run: python make_video.py

      - name: Create Direct Video Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-video
          name: Latest Rendered Video
          files: output.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
